<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TixQueue Minimal</title>
    <style>
      :root {
        --bg: #f5f7fa;
        --surface: #ffffff;
        --line: #d7dee8;
        --text: #1f2937;
        --muted: #6b7280;
        --brand: #0f766e;
        --brand-soft: #ecfdf5;
        --danger: #b91c1c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .container {
        width: min(980px, 92vw);
        margin: 0 auto;
      }

      .topbar {
        border-bottom: 1px solid var(--line);
        background: var(--surface);
        position: sticky;
        top: 0;
        z-index: 10;
      }

      .topbar-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.75rem 0;
        gap: 1rem;
        flex-wrap: wrap;
      }

      .brand {
        margin: 0;
        font-size: 1.15rem;
        cursor: pointer;
      }

      .nav {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      button {
        border: 1px solid var(--line);
        background: var(--surface);
        color: var(--text);
        border-radius: 8px;
        padding: 0.45rem 0.75rem;
        cursor: pointer;
      }

      button.primary {
        background: var(--brand);
        border-color: var(--brand);
        color: #ffffff;
      }

      main {
        padding: 1.1rem 0 2.2rem;
      }

      .panel {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 1rem;
        margin-bottom: 1rem;
      }

      .view-container {
        display: none;
      }

      .view-container.active-view {
        display: block;
      }

      .search-row {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        margin-top: 0.75rem;
      }

      .search-row input,
      .form-row input {
        flex: 1;
        min-width: 220px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0.5rem 0.6rem;
        background: #fff;
      }

      .catalog {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
        gap: 0.8rem;
        margin-top: 0.85rem;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: 10px;
        overflow: hidden;
        background: #fff;
      }

      .card img {
        width: 100%;
        height: 120px;
        object-fit: cover;
        background: #f1f5f9;
      }

      .card-body {
        padding: 0.7rem;
        display: grid;
        gap: 0.35rem;
      }

      .muted {
        color: var(--muted);
        margin: 0;
        font-size: 0.92rem;
      }

      .badge {
        background: var(--brand-soft);
        color: var(--brand);
        border: 1px solid #b7e4d9;
        border-radius: 999px;
        font-size: 0.75rem;
        padding: 0.15rem 0.5rem;
        width: fit-content;
      }

      .form-grid {
        display: grid;
        gap: 0.7rem;
        max-width: 520px;
      }

      .form-row {
        display: grid;
        gap: 0.3rem;
      }

      .status {
        margin-top: 0.6rem;
        font-size: 0.9rem;
        color: var(--muted);
      }

      .danger {
        color: var(--danger);
      }

      ul {
        margin: 0;
        padding-left: 1.1rem;
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="container topbar-row">
        <h1 class="brand" onclick="switchView('landing')">TixQueue</h1>
        <div class="nav">
          <button onclick="switchView('landing')">Home</button>
          <button onclick="switchView('queue')">Queue</button>
          <button onclick="switchView('transactions')">Transactions</button>
          <button onclick="switchView('profile')">Profile</button>
        </div>
        <div class="nav" id="navAuthControls"></div>
      </div>
    </header>

    <main class="container">
      <div id="view-landing" class="view-container active-view">
        <section class="panel">
          <p class="badge" id="heroTag">System Ready</p>
          <h2 id="heroTitle">Ticket Catalog</h2>
          <p class="muted" id="heroDescription">Simple UI for core ticket functions.</p>
          <form class="search-row" onsubmit="searchCatalog(event)">
            <input type="search" id="searchInput" placeholder="Search events" />
            <button class="primary" type="submit">Search</button>
          </form>
        </section>

        <section class="panel">
          <h3 style="margin-top: 0;">Catalog</h3>
          <div id="catalogContainer" class="catalog"></div>
        </section>
      </div>

      <div id="view-login" class="view-container">
        <section class="panel">
          <h2>Login</h2>
          <form class="form-grid" onsubmit="handleAuthLogin(event)">
            <label class="form-row">
              Email
              <input type="email" id="inputLoginEmail" required />
            </label>
            <label class="form-row">
              Password
              <input type="password" id="inputLoginPassword" required />
            </label>
            <button class="primary" type="submit">Login</button>
          </form>
        </section>
      </div>

      <div id="view-register" class="view-container">
        <section class="panel">
          <h2>Register</h2>
          <form class="form-grid" onsubmit="handleAuthRegister(event)">
            <label class="form-row">
              NIK (16 digits)
              <input type="text" id="inputRegNik" minlength="16" maxlength="16" required />
            </label>
            <label class="form-row">
              Birth date
              <input type="date" id="inputRegBirth" required />
            </label>
            <label class="form-row">
              Email
              <input type="email" id="inputRegEmail" required />
            </label>
            <label class="form-row">
              Password
              <input type="password" id="inputRegPassword" required />
            </label>
            <label class="form-row">
              Confirm password
              <input type="password" id="inputRegConfirm" required />
            </label>
            <button class="primary" type="submit">Register</button>
          </form>
        </section>
      </div>

      <div id="view-profile" class="view-container">
        <section class="panel">
          <h2>Profile</h2>
          <form class="form-grid" onsubmit="handleProfileUpdate(event)">
            <label class="form-row">
              Email
              <input type="text" id="profEmail" readonly />
            </label>
            <label class="form-row">
              NIK
              <input type="text" id="profNik" readonly />
            </label>
            <label class="form-row">
              Birth date
              <input type="date" id="profBirth" required />
            </label>
            <label class="form-row">
              New password (optional)
              <input type="password" id="profPassword" />
            </label>
            <button class="primary" type="submit">Save profile</button>
          </form>
        </section>
      </div>

      <div id="view-queue" class="view-container">
        <section class="panel">
          <h2>Queue Status</h2>
          <p class="muted">Simple queue simulation for frontend flow.</p>
          <button class="primary" onclick="simulateQueue()">Refresh Queue</button>
          <div class="status">Queue No: <strong id="qNo">-</strong></div>
          <div class="status">Total Queue: <strong id="qTotal">-</strong></div>
          <div class="status">Estimated Time: <strong id="qTime">-</strong></div>
        </section>
      </div>

      <div id="view-transactions" class="view-container">
        <section class="panel">
          <h2>Transactions</h2>
          <div id="txListContainer"></div>
        </section>
      </div>

      <div id="view-purchase" class="view-container">
        <section class="panel">
          <h2>Purchase Details</h2>
          <div id="purchaseDetailsContainer"></div>
        </section>
      </div>
    </main>

    <script>
      const API_BASE = "http://localhost:3010/api";

      let appState = {
        user: null,
        catalog: [],
        filteredCatalog: []
      };

      function switchView(viewName) {
        document.querySelectorAll(".view-container").forEach((el) => {
          el.classList.remove("active-view");
        });
        const target = document.getElementById(`view-${viewName}`);
        if (target) {
          target.classList.add("active-view");
        }
      }

      function renderAuthControls() {
        const wrapper = document.getElementById("navAuthControls");
        if (!wrapper) {
          return;
        }

        if (appState.user) {
          wrapper.innerHTML = `
            <button onclick="switchView('profile')">${appState.user.email}</button>
            <button onclick="logout()">Logout</button>
          `;
        } else {
          wrapper.innerHTML = `
            <button onclick="switchView('login')">Login</button>
            <button class="primary" onclick="switchView('register')">Register</button>
          `;
        }
      }

      function renderCatalog() {
        const container = document.getElementById("catalogContainer");
        if (!container) {
          return;
        }

        if (!appState.filteredCatalog.length) {
          container.innerHTML = `<p class="muted">No events found.</p>`;
          return;
        }

        container.innerHTML = appState.filteredCatalog
          .map(
            (item, index) => `
              <article class="card">
                <img src="${item.image}" alt="${item.alt || item.genre}" />
                <div class="card-body">
                  <strong>${item.genre || `Event ${index + 1}`}</strong>
                  <p class="muted">Stock: ${item.stock ?? 0}</p>
                  <button onclick="startPurchase('${(item.genre || `Event-${index + 1}`).replace(/'/g, "")}', ${item.stock ?? 0})">Buy</button>
                </div>
              </article>
            `
          )
          .join("");
      }

      function searchCatalog(event) {
        event.preventDefault();
        const keyword = (document.getElementById("searchInput").value || "").toLowerCase().trim();

        if (!keyword) {
          appState.filteredCatalog = [...appState.catalog];
        } else {
          appState.filteredCatalog = appState.catalog.filter((item) => {
            return `${item.genre || ""} ${item.alt || ""}`.toLowerCase().includes(keyword);
          });
        }

        renderCatalog();
      }

      function fillProfileForm() {
        const user = appState.user;
        if (!user) {
          return;
        }

        document.getElementById("profEmail").value = user.email || "";
        document.getElementById("profNik").value = user.nik || "";
        document.getElementById("profBirth").value = user.birth || "";
      }

      function handleAuthLogin(event) {
        event.preventDefault();
        const email = document.getElementById("inputLoginEmail").value.trim();
        const password = document.getElementById("inputLoginPassword").value;

        if (!email || !password) {
          alert("Email and password are required.");
          return;
        }

        const stored = JSON.parse(localStorage.getItem("tixqueue-user") || "null");
        if (!stored || stored.email !== email) {
          alert("User not found. Please register first.");
          return;
        }

        appState.user = stored;
        renderAuthControls();
        fillProfileForm();
        renderTransactions();
        switchView("landing");
      }

      function handleAuthRegister(event) {
        event.preventDefault();

        const nik = document.getElementById("inputRegNik").value.trim();
        const birth = document.getElementById("inputRegBirth").value;
        const email = document.getElementById("inputRegEmail").value.trim();
        const password = document.getElementById("inputRegPassword").value;
        const confirm = document.getElementById("inputRegConfirm").value;

        if (!/^\d{16}$/.test(nik)) {
          alert("NIK must be exactly 16 digits.");
          return;
        }

        if (password !== confirm) {
          alert("Password confirmation does not match.");
          return;
        }

        appState.user = { nik, birth, email, password };
        localStorage.setItem("tixqueue-user", JSON.stringify(appState.user));
        renderAuthControls();
        fillProfileForm();
        switchView("profile");
      }

      function handleProfileUpdate(event) {
        event.preventDefault();

        if (!appState.user) {
          alert("Please login first.");
          return;
        }

        const birth = document.getElementById("profBirth").value;
        const newPassword = document.getElementById("profPassword").value;

        appState.user.birth = birth;
        if (newPassword.trim()) {
          appState.user.password = newPassword;
        }

        localStorage.setItem("tixqueue-user", JSON.stringify(appState.user));
        document.getElementById("profPassword").value = "";
        alert("Profile updated.");
      }

      function logout() {
        appState.user = null;
        renderAuthControls();
        switchView("landing");
      }

      function simulateQueue() {
        const qNo = Math.floor(Math.random() * 180) + 1;
        const qTotal = 200;
        const waitMinutes = Math.ceil((qNo / qTotal) * 30);

        document.getElementById("qNo").textContent = String(qNo);
        document.getElementById("qTotal").textContent = String(qTotal);
        document.getElementById("qTime").textContent = `${waitMinutes} minutes`;
      }

      function startPurchase(eventName, stock) {
        const target = document.getElementById("purchaseDetailsContainer");
        target.innerHTML = `
          <p><strong>Event:</strong> ${eventName}</p>
          <p><strong>Stock:</strong> ${stock}</p>
          <button class="primary" onclick="confirmPurchase('${String(eventName).replace(/'/g, "")}')">Confirm Purchase</button>
        `;
        switchView("purchase");
      }

      function confirmPurchase(eventName) {
        const key = "tixqueue-transactions";
        const tx = JSON.parse(localStorage.getItem(key) || "[]");
        tx.unshift({
          event: eventName,
          date: new Date().toLocaleString(),
          status: "success"
        });
        localStorage.setItem(key, JSON.stringify(tx));
        renderTransactions();
        alert("Purchase recorded.");
        switchView("transactions");
      }

      function renderTransactions() {
        const list = JSON.parse(localStorage.getItem("tixqueue-transactions") || "[]");
        const container = document.getElementById("txListContainer");

        if (!list.length) {
          container.innerHTML = `<p class="muted">No transactions yet.</p>`;
          return;
        }

        container.innerHTML = `
          <ul>
            ${list
              .map((tx) => `<li>${tx.date} - ${tx.event} - <strong>${tx.status}</strong></li>`)
              .join("")}
          </ul>
        `;
      }

      async function loadHomepageData() {
        const title = document.getElementById("heroTitle");
        const tag = document.getElementById("heroTag");
        const description = document.getElementById("heroDescription");
        const searchInput = document.getElementById("searchInput");

        try {
          const response = await fetch(`${API_BASE}/homepage`);
          if (!response.ok) {
            throw new Error("Unable to load homepage data");
          }

          const data = await response.json();
          title.textContent = data.hero?.title || "Ticket Catalog";
          tag.textContent = data.hero?.tag || "System Ready";
          description.textContent = data.hero?.description || "Simple UI for core ticket functions.";
          searchInput.placeholder = data.hero?.searchPlaceholder || "Search events";

          appState.catalog = Array.isArray(data.popular?.cards) ? data.popular.cards : [];
          appState.filteredCatalog = [...appState.catalog];
          renderCatalog();
        } catch (error) {
          title.textContent = "Ticket Catalog";
          tag.textContent = "Offline Mode";
          description.innerHTML = `<span class="danger">${error.message}. Start backend on port 3010.</span>`;
          appState.catalog = [];
          appState.filteredCatalog = [];
          renderCatalog();
        }
      }

      function initializeApp() {
        const savedUser = JSON.parse(localStorage.getItem("tixqueue-user") || "null");
        if (savedUser) {
          appState.user = savedUser;
        }

        renderAuthControls();
        fillProfileForm();
        renderTransactions();
        simulateQueue();
        loadHomepageData();
      }

      initializeApp();
    </script>
  </body>
  </html>
